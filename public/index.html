<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess vs AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="sidebar">
        <h1>Move History</h1>

        <div class="controls">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
            <option value="expert">Expert</option>
          </select>

          <button id="newGameBtn" type="button">New Game</button>
        </div>

        <div class="fen-tools">
          <label for="fenInput">FEN</label>
          <textarea
            id="fenInput"
            rows="4"
            placeholder="Paste FEN and click Load FEN"
          ></textarea>
          <div class="fen-actions">
            <button id="loadFenBtn" type="button">Load FEN</button>
            <button id="copyFenBtn" type="button">Copy FEN</button>
          </div>
        </div>

        <div id="history" class="history" aria-live="polite"></div>
      </aside>

      <section class="game-area">
        <div id="board" class="board" role="grid" aria-label="Chess board"></div>

        <div class="game-bar">
          <form id="moveForm" class="move-form">
            <label for="moveInput">Type move</label>
            <input
              id="moveInput"
              name="move"
              type="text"
              placeholder="e2e4, e7e8q, e4, Nf3, O-O"
              autocomplete="off"
            />
            <button type="submit">Play</button>
          </form>

          <div class="status-wrap">
            <p id="status">Loading...</p>
            <p id="fen" class="fen"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
